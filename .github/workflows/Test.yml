name: Test

on:
  push:
    branches:
      - main
    tags: ["*"]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ReusableTest.yml
    with:
      os: ${{ matrix.os }}
      version: ${{ matrix.version }}
      arch: ${{ matrix.arch }}
      allow_failure: ${{ matrix.allow_failure }}
      run_codecov: ${{ matrix.version == '1' && matrix.os == 'ubuntu-latest' }}
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.11"
          - "1"
        os:
          - ubuntu-latest
          - macOS-latest
          
          - windows-latest
          
        arch:
          # Local deviation from BestieTemplate (which pins x64, as of v0.18.6): macOS-latest
          # runners are Apple Silicon, and setup-julia@v3 (Dependabot-bumped from the template's
          # v2) rejects x64 there instead of falling back to Rosetta. "default" resolves to the
          # runner's native arch (aarch64 on macOS, x64 on ubuntu/windows).
          - default
        allow_failure: [false]
